BASE_TASK_CONFIG_PATH: run_r2r/r2r_vlnce.yaml
SIMULATOR_GPU_IDS: [0]
TORCH_GPU_ID: 0
TORCH_GPU_IDS: [0]
TRAINER_NAME: SS-ETP
GPU_NUMBERS: 1
NUM_ENVIRONMENTS: 1
TENSORBOARD_DIR: data/logs/tensorboard_dirs/
CHECKPOINT_FOLDER: data/logs/checkpoints/
EVAL_CKPT_PATH_DIR: data/logs/checkpoints/
RESULTS_DIR: data/logs/eval_results/
VIDEO_DIR: data/logs/video/
VIDEO_OPTION: []

INFERENCE:
  SPLIT: test
  USE_CKPT_CONFIG: False
  SAMPLE: False
  CKPT_PATH: ""
  PREDICTIONS_FILE: ""
  FORMAT: r2r
  EPISODE_COUNT: -1

EVAL:
  USE_CKPT_CONFIG: False
  SPLIT: val_unseen
  EPISODE_COUNT: -1
  CKPT_PATH_DIR: data/logs/checkpoints/release_r2r_dino_best_nav/ckpt.iter13200.pth
  fast_eval: False

IL:
  iters: 20000
  log_every: 200
  lr: 1e-5
  batch_size: 1
  ml_weight: 1.0
  expert_policy: spl
  sample_ratio: 0.75
  decay_interval: 3000
  load_from_ckpt: False
  ckpt_to_load: data/logs/checkpoints/ckpt.iter12000.pth
  is_requeue: False
  max_traj_len: 15
  max_text_len: 80
  loc_noise: 0.50
  use_dynamic_loc_noise: False
  dynamic_loc_noise_min: 0.25
  dynamic_loc_noise_max: 0.50
  dynamic_loc_noise_alpha: 0.86
  dynamic_loc_noise_beta: 0.23
  dynamic_loc_noise_mapping: linear
  dynamic_loc_noise_sigmoid_k: 12.0
  dynamic_loc_noise_exponential_k: 4.0
  use_random_loc_noise: False
  random_loc_noise_min: 0.25
  random_loc_noise_max: 0.50
  waypoint_aug: False
  ghost_aug: 0.0
  back_algo: control
  tryout: True

MODEL:
  task_type: r2r
  policy_name: PolicyViewSelectionETP
  rgb_feature_extractor: dino
  dino: EffoNav
  NUM_ANGLES: 12
  pretrained_path: pretrained/ETP/mlm.sap_r2r/ckpts/model_step_82500.pt
  fix_lang_embedding: False
  fix_pano_embedding: False
  use_depth_embedding: True
  use_sprels: True
  merge_ghost: True
  consume_ghost: True
  use_dynamic_graph: True
  dynamic_graph_lr: 1e-4
  use_esem: True
  use_einst: True
  use_geo_dropout: False
  geo_dropout_prob: 0.3
  use_node_gating: False
  node_gating_lr: 1e-4
  spatial_output: False
  RGB_ENCODER:
    output_size: 512
  DEPTH_ENCODER:
    output_size: 256
  VISUAL_DIM:
    vis_hidden: 768
    directional: 128
  INSTRUCTION_ENCODER:
    bidirectional: True

ORACLE:
  ENABLE: True
  MODE: O1
  PROVIDER: SimulatorPeekOracleProvider
  FORCE_HAVE_REAL_POS: True
  QUERY_PIPELINE: future_node_avg_pano
  QUERY_POS_STRATEGY: ghost_real_pos_mean
  QUERY_POS_FALLBACK: nearest_real_pos
  QUERY_HEADING_STRATEGY: face_frontier
  TARGET_GHOST_SCOPE: all
  QUERY_ONLY_NEW_OR_CHANGED: True
  REQUERY_ON_REALPOS_UPDATE: True
  REQUERY_MIN_POS_DELTA: 0.10
  NAVIGABILITY_CHECK: True
  NAVIGABILITY_SEARCH_RADIUS: 1.0
  NAVIGABILITY_NUM_SAMPLES: 16
  NAVIGABILITY_Y_LOCK: True
  CACHE_ENABLE: True
  CACHE_RADIUS: 0.25
  CACHE_MAX_ITEMS_PER_SCENE: 4096
  MAX_QUERIES_PER_STEP: -1
  MAX_QUERIES_PER_EPISODE: -1
  USE_AMP: False
  EMBED_DTYPE: fp32
  PERSISTENT_WRITEBACK: True
  HARD_REPLACE: True
  TRACE:
    ENABLE: True
    DIR: data/logs/oracle_traces/
    FORMAT: jsonl
    LOG_EVERY_N_STEPS: 1
    COUNTERFACTUAL_TRACE: False
    INCLUDE_EMBED_VECTOR: False
    INCLUDE_EMBED_NORM: True
    INCLUDE_POSITIONS: True
    INCLUDE_FAILURES: True
